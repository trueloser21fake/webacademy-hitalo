name: Atividade 02.4 - Validando o repositório

on:

    push:

jobs:

    validar-estrutura:

        runs-on: ubuntu-latest
        steps:
            
        - name: Checkout
          uses: actions/checkout@v5
        - name: Verifica README.md
          run: test -f README.md || (echo "README.md não existe" && exit 1)
        - name: Verifica LICENSE
          run: test -f LICENSE || (echo "LICENSE não existe" && exit 1)
        - name: Verifica .gitignore
          run: test -f .gitignore || (echo ".gitignore não existe" && exit 1)