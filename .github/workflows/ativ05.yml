name: Segundo Workflow

on:
  push:

jobs:
  primeiro-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Primeiro passo"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Data
        run: date
      - name: Vesao do Git
        run: git --version

  segundo-job:
     runs-on: ubuntu-latest
     needs: primeiro-job
     steps:
        - name: Checkout
          uses: actions/checkout@v5
        - name: Verifica README.md
          run: test -f README.md || (echo "README.md não existe" && exit 1)
        - name: Verifica LICENSE
          run: test -f LICENSE || (echo "LICENSE não existe" && exit 1)
        - name: Verifica .gitignore
          run: test -f .gitignore || (echo ".gitignore não existe" && exit 1)

      

